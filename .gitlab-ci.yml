# 🦅 鲲鹏志 · CI/CD Pipeline (Checkpoint 版)
# Runner: kunpeng-burner (Group: seekkey)
# 策略：每次触发处理 5 章，进度存入 progress.json，断点续传

variables:
  MODEL: "gemini-2.5-flash"

stages:
  - status
  - batch
  - publish

# =========================================
# 0. 状态上报（每次触发先看进度）
# =========================================
show-status:
  stage: status
  tags: [burn]
  script:
    - cd ~/kunpengzhi-ai
    - python3 scripts/checkpoint_runner.py --mode status
    - du -sh outputs/ 2>/dev/null || echo "暂无产出"

# =========================================
# 1. 处理下一批 5 章知识图谱
# =========================================
batch-kg:
  stage: batch
  tags: [burn, kg]
  script:
    - cd ~/kunpengzhi-ai
    - python3 scripts/checkpoint_runner.py --mode kg --batch-size 5
    - echo "📊 本次产出:"
    - find outputs/kg/ -name "*.json" -type f | wc -l
    - echo "个知识图谱文件"
  artifacts:
    paths:
      - outputs/kg/
    expire_in: 7 days

# =========================================
# 2. 处理下一批 3 章分析
# =========================================
batch-analysis:
  stage: batch
  tags: [burn, analysis]
  needs: [batch-kg]
  script:
    - cd ~/kunpengzhi-ai
    - python3 scripts/checkpoint_runner.py --mode analysis --batch-size 3
    - echo "📊 本次产出:"
    - find outputs/analysis/ -type f | wc -l
    - echo "个分析文件"
  artifacts:
    paths:
      - outputs/analysis/
    expire_in: 7 days

# =========================================
# 3. 推送到 GitHub（内容仓库）
# =========================================
publish-content:
  stage: publish
  tags: [burn]
  needs: [batch-analysis]
  script:
    - echo "📤 同步到 R2..."
    - cd ~/kunpengzhi-ai
    - |
      for f in $(find outputs/ -type f -name "*.json" -newer progress.json 2>/dev/null); do
        echo "  上传: $f"
        curl -s -X PUT "https://$CLOUDFLARE_ACCOUNT_ID.r2.cloudflarestorage.com/$R2_BUCKET/$f" \
          -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
          -T "$f" > /dev/null
      done
    - echo "✅ R2 同步完成"

# pipeline 清理：3天后自动删除 artifacts
variables:
  GIT_STRATEGY: none  # 不需要 clone 代码，全在本地操作
