# 🦅 鲲鹏志 · CI/CD Pipeline
# Runner: kunpeng-burner (Group: seekkey)
# 策略：小步快跑，每步 5 章，失败只丢一小批

variables:
  PIPELINE_DEBUG: "1"
  LITELLM_BASE_URL: "http://localhost:4000/v1"
  LITELLM_API_KEY: "sk-47318"
  MODEL: "gemini-2.5-flash"

stages:
  - check
  - batch-kg
  - batch-analysis
  - batch-podcast
  - batch-debate
  - quality-check
  - publish
  - notify

# =========================================
# 1. 环境检查
# =========================================
check-env:
  stage: check
  tags: [burn]
  script:
    - echo "✅ Runner 在线: $(hostname)"
    - python3 --version
    - curl -s -o /dev/null -w "litellm: %{http_code}" $LITELLM_BASE_URL/models
    - echo ""
    - echo "📦 可用模型: $MODEL"
  only:
    - schedules

# =========================================
# 2. 批次知识图谱 (每批 5 章)
# =========================================
kg-batch-1:
  stage: batch-kg
  tags: [burn, kg]
  script:
    - cd ~/kunpengzhi-ai
    - python3 scripts/batch_processor.py --mode kg --batch 1 --count 5
  artifacts:
    paths:
      - outputs/kg/
    expire_in: 30 days

kg-batch-2:
  stage: batch-kg
  tags: [burn, kg]
  needs: [kg-batch-1]
  script:
    - cd ~/kunpengzhi-ai
    - python3 scripts/batch_processor.py --mode kg --batch 2 --count 5
  artifacts:
    paths:
      - outputs/kg/
    expire_in: 30 days

kg-batch-3:
  stage: batch-kg
  tags: [burn, kg]
  needs: [kg-batch-2]
  script:
    - cd ~/kunpengzhi-ai
    - python3 scripts/batch_processor.py --mode kg --batch 3 --count 5
  artifacts:
    paths:
      - outputs/kg/
    expire_in: 30 days

# =========================================
# 3. 章节分析 (紧跟 KG 批次)
# =========================================
analysis-batch-1:
  stage: batch-analysis
  tags: [burn, analysis]
  needs: [kg-batch-1]
  script:
    - cd ~/kunpengzhi-ai
    - python3 scripts/batch_processor.py --mode analysis --batch 1 --count 5
  artifacts:
    paths:
      - outputs/analysis/
    expire_in: 30 days

analysis-batch-2:
  stage: batch-analysis
  tags: [burn, analysis]
  needs: [kg-batch-2]
  script:
    - cd ~/kunpengzhi-ai
    - python3 scripts/batch_processor.py --mode analysis --batch 2 --count 5
  artifacts:
    paths:
      - outputs/analysis/
    expire_in: 30 days

# =========================================
# 4. 质量检查
# =========================================
quality-check:
  stage: quality-check
  tags: [burn]
  needs: [analysis-batch-1]
  script:
    - cd ~/kunpengzhi-ai
    - python3 -c "
from core.graph_rag import build_graph
build_graph()
print('✅ 知识图谱: 可用')
"
    - echo "📊 本批产出:" 
    - find outputs/ -type f | head -5
    - echo "✅ 质量检查通过"

# =========================================
# 5. 发布到 GitLab
# =========================================
publish:
  stage: publish
  tags: [burn]
  script:
    - cd ~/kunpengzhi
    - git add -A
    - git commit -m "🦅 CI 自动更新: $(date '+%Y-%m-%d %H:%M')"
    - git push origin main
  only:
    - schedules

# =========================================
# 6. 飞书通知
# =========================================
notify-feishu:
  stage: notify
  tags: [burn]
  script:
    - cd ~/kunpengzhi-ai
    - echo "✅ Pipeline 完成: $(date)"
    - du -sh outputs/ || true
  only:
    - schedules
