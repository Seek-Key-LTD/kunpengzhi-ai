<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>螺旋谱 — 鲲鹏志</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    color: #e0d9c8;
    font-family: 'LXGW WenKai Screen', 'PingFang SC', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }
  h1 { font-size: 1.2rem; letter-spacing: 0.2em; margin: 20px 0 10px; opacity: 0.6; }
  #canvas-wrap { position: relative; }
  canvas {
    display: block;
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 4px;
  }
  #controls {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 820px;
  }
  .seat-btn {
    padding: 6px 14px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.04);
    color: #c8bfa8;
    border-radius: 3px;
    cursor: pointer;
    font-size: 0.85rem;
    font-family: inherit;
    transition: all 0.2s;
  }
  .seat-btn:hover { background: rgba(255,255,255,0.1); }
  .seat-btn.active {
    background: rgba(255,255,255,0.15);
    border-color: rgba(255,255,255,0.4);
    color: #fff;
  }
  #status {
    margin-top: 10px;
    font-size: 0.75rem;
    color: rgba(255,255,255,0.2);
    display: flex;
    gap: 20px;
  }
  #status span { color: rgba(255,255,255,0.4); }
</style>
</head>
<body>

<h1>🦅 螺线谱 · 鲲鹏志</h1>

<div id="canvas-wrap">
  <canvas id="spiral" width="820" height="820"></canvas>
</div>

<div id="controls">
  <!-- 8席按钮由JS动态生成 -->
</div>

<div id="status">
  <span id="current-seat">乾 G · 吕洞宾</span>
  <span id="fps">-- fps</span>
  <span>双盲 · 群龙无首</span>
</div>

<script>
// ── 配置 ────────────────────────────────────────────
const SEATS = [
  { id: "seat_1", name: "吕洞宾", trigram: "乾", gua: "☰", note: "G",  freq: 196.0,  color: "#ff6b35" },
  { id: "seat_2", name: "何仙姑", trigram: "坤", gua: "☷", note: "C",  freq: 261.63, color: "#35c87d" },
  { id: "seat_3", name: "张果老", trigram: "艮", gua: "☶", note: "D",  freq: 293.66, color: "#7b68ee" },
  { id: "seat_4", name: "韩湘子", trigram: "兑", gua: "☱", note: "A",  freq: 440.0,  color: "#ffd700" },
  { id: "seat_5", name: "汉钟离", trigram: "离", gua: "☲", note: "Eb", freq: 311.13, color: "#ff4757" },
  { id: "seat_6", name: "蓝采和", trigram: "坎", gua: "☵", note: "Ab", freq: 415.30, color: "#1e90ff" },
  { id: "seat_7", name: "曹国舅", trigram: "震", gua: "☳", note: "Bb", freq: 466.16, color: "#ff69b4" },
  { id: "seat_8", name: "铁拐李", trigram: "巽", gua: "☴", note: "Db", freq: 554.37, color: "#00fa9a" },
];

const ROOT_OFFSET = { G: 0, C: 5, D: 2, A: 9, Eb: 3, Ab: 8, Bb: 10, Db: 1 };
const LOOPS = 8;
const NOTES_PER_LOOP = 12;
const DEGREES_PER_NOTE = 360 / NOTES_PER_LOOP;
const PENTATONIC_DEGREES = [0, 2, 4, 7, 9]; // 五声音阶度数

// ── 状态 ────────────────────────────────────────────
let activeSeat = SEATS[0];
let animFrame = 0;
let particles = [];
let lastTime = performance.now();
let fpsCount = 0;

// ── 初始化 ────────────────────────────────────────────
const canvas = document.getElementById("spiral");
const ctx = canvas.getContext("2d");
const W = canvas.width, H = canvas.height;
const CX = W / 2, CY = H / 2;
const MAX_R = Math.min(W, H) * 0.46;

const controls = document.getElementById("controls");
SEATS.forEach((seat, i) => {
  const btn = document.createElement("button");
  btn.className = "seat-btn" + (i === 0 ? " active" : "");
  btn.textContent = `${seat.gua} ${seat.note} · ${seat.name}`;
  btn.title = `${seat.trigram} · ${seat.freq}Hz`;
  btn.onclick = () => {
    document.querySelectorAll(".seat-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeSeat = seat;
    resetParticles();
    document.getElementById("current-seat").textContent =
      `${seat.trigram} ${seat.note} · ${seat.name}`;
  };
  controls.appendChild(btn);
});

function resetParticles() { particles = []; }

function spawnParticle(angleDeg, radius) {
  const offset = ROOT_OFFSET[activeSeat.note] * DEGREES_PER_NOTE;
  particles.push({
    angle: angleDeg + offset,
    radius,
    life: 1.0,
    size: Math.random() * 3 + 1,
    hue: (animFrame * 2) % 360,
  });
}

// ── 绘制 ─────────────────────────────────────────────
function drawSpiral() {
  ctx.clearRect(0, 0, W, H);

  // 背景星点
  ctx.fillStyle = "rgba(255,255,255,0.018)";
  for (let i = 0; i < 80; i++) {
    const x = (Math.sin(i * 137.5 * Math.PI / 180) * 0.5 + 0.5) * W;
    const y = (Math.cos(i * 137.5 * Math.PI / 180) * 0.5 + 0.5) * H;
    ctx.beginPath();
    ctx.arc(x, y, 0.8, 0, Math.PI * 2);
    ctx.fill();
  }

  // 外圈八卦符号
  ctx.font = "13px sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  SEATS.forEach((seat, i) => {
    const a = (i / 8) * Math.PI * 2 - Math.PI / 2;
    const r = MAX_R + 28;
    const x = CX + Math.cos(a) * r;
    const y = CY + Math.sin(a) * r;
    ctx.fillStyle = seat.color + "aa";
    ctx.fillText(seat.gua, x, y);
  });

  // 螺旋骨架
  const rootDeg = ROOT_OFFSET[activeSeat.note] * DEGREES_PER_NOTE;
  ctx.strokeStyle = "rgba(255,255,255,0.06)";
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (let loop = 0; loop <= LOOPS; loop++) {
    for (let n = 0; n <= NOTES_PER_LOOP; n++) {
      const deg = rootDeg + (loop * 360) + (n * DEGREES_PER_NOTE);
      const rad = (deg * Math.PI) / 180;
      const r = (loop / LOOPS) * MAX_R;
      const x = CX + Math.cos(rad) * r;
      const y = CY + Math.sin(rad) * r;
      if (loop === 0 && n === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
  }
  ctx.stroke();

  // 五声音阶高亮线
  PENTATONIC_DEGREES.forEach(d => {
    const deg = rootDeg + d * DEGREES_PER_NOTE;
    const rad = (deg * Math.PI) / 180;
    ctx.strokeStyle = activeSeat.color + "55";
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let loop = 0; loop <= LOOPS; loop++) {
      const r = (loop / LOOPS) * MAX_R;
      const x = CX + Math.cos(rad) * r;
      const y = CY + Math.sin(rad) * r;
      if (loop === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
  });

  // 中心根音
  ctx.beginPath();
  ctx.arc(CX, CY, 6, 0, Math.PI * 2);
  ctx.fillStyle = activeSeat.color;
  ctx.fill();
  ctx.font = "bold 11px sans-serif";
  ctx.fillStyle = "#fff";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(activeSeat.note, CX, CY);

  // 粒子
  particles = particles.filter(p => {
    p.life -= 0.008;
    p.radius += 0.4;
    p.hue = (p.hue + 1.5) % 360;
    if (p.life <= 0) return false;
    const rad = (p.angle * Math.PI) / 180;
    const x = CX + Math.cos(rad) * p.radius;
    const y = CY + Math.sin(rad) * p.radius;
    ctx.beginPath();
    ctx.arc(x, y, p.size * p.life, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${p.hue}, 80%, 65%, ${p.life * 0.7})`;
    ctx.fill();
    return true;
  });

  if (particles.length < 12 && Math.random() > 0.6) {
    const loop = Math.floor(Math.random() * LOOPS);
    const note = PENTATONIC_DEGREES[Math.floor(Math.random() * PENTATONIC_DEGREES.length)];
    const deg = ROOT_OFFSET[activeSeat.note] * DEGREES_PER_NOTE + note * DEGREES_PER_NOTE + (loop * 360);
    const r = (loop / LOOPS) * MAX_R;
    spawnParticle(deg, r);
  }

  animFrame++;

  // FPS 计数
  fpsCount++;
  const now = performance.now();
  if (now - lastTime >= 1000) {
    document.getElementById("fps").textContent = `${fpsCount} fps`;
    fpsCount = 0;
    lastTime = now;
  }

  requestAnimationFrame(drawSpiral);
}

drawSpiral();

// 模拟辩论：每隔0.6秒在随机五声音阶位置产生粒子
setInterval(() => {
  const loop = Math.floor(Math.random() * LOOPS);
  const note = PENTATONIC_DEGREES[Math.floor(Math.random() * PENTATONIC_DEGREES.length)];
  const deg = ROOT_OFFSET[activeSeat.note] * DEGREES_PER_NOTE + note * DEGREES_PER_NOTE + (loop * 360);
  const r = (loop / LOOPS) * MAX_R;
  for (let i = 0; i < 4; i++) spawnParticle(deg + (Math.random() - 0.5) * 15, r);
}, 600);
</script>
</body>
</html>
